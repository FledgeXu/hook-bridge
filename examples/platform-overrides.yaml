version: 1

defaults:
  shell: sh
  timeout_sec: 15

hooks:
  - id: guard.destructive.commands
    description: Block obviously destructive shell commands with platform-native messages.
    event: before_command
    status_message: Checking command safety policy
    matcher: "^(rm(\\s+-[A-Za-z-]*[rf][A-Za-z-]*)?\\b|git\\s+reset\\s+--hard\\b|git\\s+checkout\\s+--\\b)"
    command: |
      printf '%s\n' 'dangerous command rejected by hook_bridge'
      exit 1
    platforms:
      claude:
        decision: block
        reason: Dangerous shell command rejected by policy.
      codex:
        systemMessage: Use a non-destructive command or ask for explicit approval.

  - id: context.session_banner
    description: Emit session context text for both platforms using their supported output style.
    event: session_start
    matcher: ".*"
    command: |
      printf '%s\n' 'Repository policy loaded: avoid destructive git commands and write concise commit messages.'
    platforms:
      claude:
        command: |
          printf '%s\n' '{"hook_bridge":{"kind":"additional_context","text":"Repository policy loaded: avoid destructive git commands and write concise commit messages."}}'
      codex:
        command: |
          printf '%s\n' 'Repository policy loaded: avoid destructive git commands and write concise commit messages.'

  - id: claude.notification.audit
    description: Claude-only notification matcher example.
    event: Notification
    matcher: "token-refresh"
    command: |
      mkdir -p .hook_bridge
      printf '%s\n' 'Claude notification observed: token-refresh' >> .hook_bridge/claude-notifications.log
    platforms:
      codex:
        enabled: false

  - id: codex.post_tool.summary
    description: Codex-only post-tool context injection example.
    event: after_command
    matcher: ".*"
    command: |
      printf '%s\n' '{"hook_bridge":{"kind":"additional_context","text":"Summarize tool changes briefly and mention verification status."}}'
    platforms:
      claude:
        enabled: false
