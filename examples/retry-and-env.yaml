version: 1

defaults:
  shell: sh
  timeout_sec: 20
  max_retries: 2

hooks:
  - id: audit.payload.capture
    description: Persist each hook payload with merged common and platform-specific environment.
    event: before_command
    matcher: ".*"
    command: |
      mkdir -p .hook_bridge/audit
      payload="$(cat)"
      printf '%s\n' "$payload" >> ".hook_bridge/audit/${AUDIT_FILE}"
      {
        printf 'platform=%s\n' "$HOOK_BRIDGE_PLATFORM"
        printf 'event=%s\n' "$HOOK_BRIDGE_EVENT"
        printf 'rule=%s\n' "$HOOK_BRIDGE_RULE_ID"
        printf 'tag=%s\n' "$AUDIT_TAG"
        printf '%s\n' '--'
      } >> ".hook_bridge/audit/${AUDIT_META_FILE}"
    env:
      AUDIT_FILE: payload.jsonl
      AUDIT_META_FILE: payload.meta.log
      AUDIT_TAG: common
    platforms:
      claude:
        env:
          AUDIT_TAG: claude
      codex:
        env:
          AUDIT_TAG: codex

  - id: retry.flaky.post_tool
    description: Demonstrate per-rule retry override for flaky post-tool checks.
    event: after_command
    matcher: ".*"
    command: |
      test -f .hook_bridge/retry-ready
    max_retries: 1

  - id: custom.cwd.override
    description: Run a hook from a fixed absolute working directory instead of the incoming hook cwd.
    event: before_command
    matcher: ".*"
    working_dir: /tmp
    env:
      AUDIT_FILE: cwd-check.txt
    command: |
      pwd > "$AUDIT_FILE"
