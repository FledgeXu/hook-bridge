# Basic shared hooks for session start plus pre/post tool logging.
version: 1

defaults:
  shell: sh
  timeout_sec: 10
  max_retries: 0

hooks:
  - id: log.session_start
    description: Record each new session or thread start in a compact audit log.
    event: session_start
    matcher: ".*"
    command: |
      mkdir -p .hook_bridge
      printf '%s\t%s\t%s\n' \
        "$HOOK_BRIDGE_PLATFORM" \
        "$HOOK_BRIDGE_EVENT" \
        "$HOOK_BRIDGE_RULE_ID" >> .hook_bridge/session-start.log

  - id: log.pre_tool
    description: Persist each pre-tool payload for later debugging.
    event: before_command
    matcher: ".*"
    command: |
      mkdir -p .hook_bridge/pre-tool
      payload="$(cat)"
      printf '%s\n' "$payload" >> ".hook_bridge/pre-tool/${HOOK_BRIDGE_PLATFORM}-${HOOK_BRIDGE_RULE_ID}.jsonl"

  - id: log.post_tool
    description: Append a lightweight post-tool audit entry.
    event: after_command
    matcher: ".*"
    command: |
      mkdir -p .hook_bridge
      printf '%s\t%s\t%s\n' \
        "$HOOK_BRIDGE_PLATFORM" \
        "$HOOK_BRIDGE_EVENT" \
        "$HOOK_BRIDGE_RULE_ID" >> .hook_bridge/post-tool.log
