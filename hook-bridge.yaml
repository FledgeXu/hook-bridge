version: 1

defaults:
  shell: sh
  timeout_sec: 1800

hooks:
  - id: stop.static-checks
    description: Run the workspace verification gate before allowing a stop event to finish.
    event: Stop
    status_message: Verifying...
    command: |
      make verify

  - id: stop.auto-review
    description: Run the automated review gate before allowing a stop event to finish.
    event: Stop
    status_message: Reviewing...
    command: python3 ./scripts/hooks/auto_review.py
