version: 1

defaults:
  shell: sh
  timeout_sec: 1800

hooks:
  - id: stop.static-checks
    description: Run the workspace verification gate before allowing a stop event to finish.
    event: Stop
    status_message: Verifying...
    command: |
      if git diff --name-only --cached --diff-filter=ACMR | grep -q '\.rs$' \
        || git diff --name-only --diff-filter=ACMR | grep -q '\.rs$' \
        || git ls-files --others --exclude-standard | grep -q '\.rs$'; then
        make verify
      else
        echo "No Rust file changes detected; skipping verification."
      fi

  - id: stop.auto-review
    description: Run the automated review gate before allowing a stop event to finish.
    event: Stop
    status_message: Reviewing...
    command: python3 ./scripts/hooks/auto_review.py
